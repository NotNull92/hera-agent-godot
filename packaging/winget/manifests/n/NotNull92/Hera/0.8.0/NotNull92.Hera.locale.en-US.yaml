ShortDescription: Low-token CLI that lets AI coding agents inspect and control a live Godot editor.
Description: |-
  Hera is a compact-JSON-by-default CLI that lets AI coding agents (and humans)
  inspect and control a live Godot 4.x editor over localhost HTTP: read the
  scene tree and editor output, run scenes, edit nodes with undoable steps,
  wire signals, drive a running game, and QA it with proof. It pairs with the
  Hera Agent Godot editor addon (installed from the Godot Asset Store or the
  GitHub release assets).
