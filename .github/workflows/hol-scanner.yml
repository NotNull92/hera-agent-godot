name: HOL Plugin Scanner

# Scans the Codex plugin for the awesome-codex-plugins listing requirement:
# score >= 80/130 with no critical or high findings.
on:
  push:
    branches: [main]
    paths:
      - "integrations/codex/**"
      - ".agents/plugins/**"
      - ".github/workflows/hol-scanner.yml"
  pull_request:
    branches: [main]
    paths:
      - "integrations/codex/**"
      - ".agents/plugins/**"
      - ".github/workflows/hol-scanner.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@v1
        with:
          plugin_dir: "./integrations/codex/hera-godot"
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
