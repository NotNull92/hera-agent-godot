name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Install archive tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zip

      - name: Build CLI binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p build dist
          ldflags="-s -w -X github.com/NotNull92/hera-agent-godot/cmd.version=${VERSION}"
          # Asset names are version-less so installers can fetch them from
          # /releases/latest/download/<asset>. The binary still reports VERSION.
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            bin="hera"
            [ "$os" = "windows" ] && bin="hera.exe"
            echo "── building $os/$arch"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "$ldflags" -o "build/$bin" .
            if [ "$os" = "windows" ]; then
              (cd build && zip -q "../dist/hera-${os}-${arch}.zip" "$bin")
            else
              tar -C build -czf "dist/hera-${os}-${arch}.tar.gz" "$bin"
            fi
            rm -f "build/$bin"
          done

      - name: Package Godot addon
        run: |
          set -euo pipefail
          # Entries are addons/hera_agent_godot/... so users unzip into a
          # Godot project root.
          (cd godot && zip -qr "../dist/hera-agent-godot-addon.zip" addons/hera_agent_godot)

      - name: Checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum * > checksums.txt)
          cat dist/checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
